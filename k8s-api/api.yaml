apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: w9-api:1
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: ERROR_RATE
          value: "0.0" # Đã chỉnh về 0 để ngưng tạo lỗi ảo
        - name: VERSION
          value: "v3"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
  strategy:
    canary:
      steps:
      # Bước 1: Điều hướng 25% traffic vào phiên bản mới. 75% vẫn chạy bản cũ an toàn.
      - setWeight: 25
      # Bước 2: Tự động chạy bài kiểm tra (Analysis) để đánh giá chất lượng 25% traffic mới này
      - analysis:
          templates:
          - templateName: success-rate # Tên bài test được gọi từ file analysis.yaml
          args:
          - name: service-name
            value: api
      # Bước 3: Nếu bài test pass (thành công), nhả tiếp 50% traffic
      - setWeight: 50
      # Bước 4: Tạm dừng 30 giây để nghe ngóng tình hình (có thể bỏ bước này nếu muốn auto 100%)
      - pause: { duration: 30s }
      # Bước 5: Nâng lên 100%, kết thúc thành công quá trình cập nhật
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
