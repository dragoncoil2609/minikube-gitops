apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-alerts
  namespace: demo
  labels:
    release: monitoring
spec:
  groups:
  - name: api-error-alerts
    rules:
    - alert: HighErrorRate
      expr: (sum(rate(flask_http_request_total{status=~"5.*"}[1m])) / sum(rate(flask_http_request_total[1m]))) > 0.10
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Cảnh báo khẩn: API đang gặp lỗi 500 diện rộng!"
        description: "Tỷ lệ lỗi HTTP 500 của API đã vượt qua 10% trong 1 phút qua. Vui lòng kiểm tra ngay lập tức."
