apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: reactsurvey
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: huyhoang2609/crud_frontend:419635d
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"
