apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: reactsurvey
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: huyhoang2609/crud_frontend:1dfffdb
          imagePullPolicy: Always
          ports:
            - containerPort: 80
