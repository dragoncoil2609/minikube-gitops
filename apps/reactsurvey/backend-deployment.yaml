apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: reactsurvey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: huyhoang2609/crud_backend:419635d
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: reactsurvey-config
            - secretRef:
                name: reactsurvey-secret
