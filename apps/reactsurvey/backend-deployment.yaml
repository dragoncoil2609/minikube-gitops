apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: reactsurvey
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: huyhoang2609/crud_backend:1dfffdb
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "123456"
            - name: DB_NAME
              value: "crud_db"
            - name: PORT
              value: "3000"
