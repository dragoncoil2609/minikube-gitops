apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.3.2 # Phiên bản ổn định mới nhất hiện tại
    helm:
      releaseName: monitoring
      values: |
        grafana:
          adminPassword: admin123
          service:
            type: NodePort

        prometheus:
          service:
            type: NodePort

        alertmanager:
          service:
            type: NodePort

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
